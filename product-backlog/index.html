<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TREAD — Workflow Roadmap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{color-scheme:light;
    --yellow:#FFE500; --amber:#FFAA13; --amber-d:#EA6200; --ink:#132732; --ink-d:#0A1820;
    --info:#0B72ED; --success:#33CF77; --error:#FF0E4A;
    --n100:#F1F6F9; --n200:#D6DDE1; --n500:#84929A; --n600:#697982; --n700:#4E606A; --line:#D6DDE1; --rowalt:#F1F6F9;}
  *{box-sizing:border-box;}
  body{margin:0;background:#fff;color:var(--ink);font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased;}
  header.top{background:var(--ink-d);color:#fff;padding:22px 30px 20px;position:relative;}
  header.top::after{content:"";position:absolute;left:0;right:0;bottom:0;height:4px;background:linear-gradient(90deg,var(--yellow),var(--amber));}
  .brand{display:flex;align-items:center;gap:9px;margin-bottom:14px;}
  .brand svg{width:28px;height:22px;} .brand .wm{font-weight:700;font-size:17px;letter-spacing:.5px;}
  header.top .eyebrow{color:var(--yellow);font-size:11px;letter-spacing:2.5px;font-weight:600;text-transform:uppercase;}
  header.top h1{margin:5px 0 4px;font-size:28px;font-weight:600;letter-spacing:-.6px;}
  header.top p{margin:0;color:#CADCFC;font-size:14px;}
  .sheetbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:var(--n100);border:1px solid var(--line);border-radius:10px;padding:10px 14px;margin:18px 0 22px;font-size:13px;color:var(--n700);}
  .sheetbar .grow{flex:1;min-width:200px;}
  .sheetbar a,.sheetbar button{font-family:inherit;color:var(--ink-d);font-weight:700;background:var(--yellow);padding:7px 13px;border-radius:8px;text-decoration:none;border:none;cursor:pointer;font-size:13px;}
  .sheetbar button.ghost{background:#fff;box-shadow:inset 0 0 0 1.5px var(--ink-d);}
  main{max-width:1180px;margin:0 auto;padding:22px 30px 80px;}
  .sec-label{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--n600);font-weight:600;margin:0 0 6px;}
  .legend-key{margin:0 0 14px;font-size:12.5px;color:var(--n600);font-weight:600;}
  .legend-key .dot{color:var(--success);} .legend-key .dot-scope{color:var(--amber-d);}
  .overview{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px;}
  .ov-card{background:#fff;border:1.5px solid var(--line);border-radius:16px;padding:18px;cursor:pointer;transition:transform .15s,box-shadow .15s,border-color .15s;display:flex;flex-direction:column;}
  .ov-card:hover{transform:translateY(-3px);box-shadow:0 10px 26px rgba(19,39,50,.13);border-color:var(--amber);}
  .ov-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;}
  .ov-num{width:27px;height:27px;border-radius:8px;background:var(--yellow);color:var(--ink-d);font-weight:700;font-size:13px;display:inline-flex;align-items:center;justify-content:center;}
  .ov-card h3{margin:2px 0 11px;font-size:17px;font-weight:600;letter-spacing:-.2px;line-height:1.25;}
  .ov-card ul{margin:0;padding-left:18px;color:var(--n700);font-size:13.5px;}
  .ov-card li{margin-bottom:4px;} .ov-card li .dot{color:var(--success);font-weight:700;} .ov-card li .dot-scope{color:var(--amber-d);font-weight:700;}
  .ov-foot{margin-top:auto;padding-top:13px;font-size:13px;color:var(--ink);font-weight:700;} .ov-foot::after{content:" →";color:var(--amber);}
  .chip{font-size:11px;font-weight:700;padding:4px 11px;border-radius:999px;white-space:nowrap;}
  .chip-prog{background:rgba(51,207,119,.16);color:#1e8f4e;} .chip-prog::before{content:"● ";}
  .chip-scope{background:rgba(255,170,19,.20);color:var(--amber-d);} .chip-scope::before{content:"◆ ";}
  .chip-plan{background:var(--n100);color:var(--n600);border:1px solid var(--n200);}
  .hr{height:1px;background:var(--line);margin:30px 0 22px;}
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px;} .toolbar .sec-label{margin:0;flex:1;}
  .btn{font-family:inherit;height:42px;padding:0 16px;border:none;background:#fff;color:#000;font-size:13px;font-weight:700;border-radius:2px;cursor:pointer;display:inline-flex;align-items:center;box-shadow:inset 0 0 0 1.5px #000;}
  .btn:hover{box-shadow:inset 0 0 0 2px #000;} .btn.primary{box-shadow:none;background:linear-gradient(180deg,var(--yellow),var(--amber));}
  .detail{border:1.5px solid var(--line);border-radius:14px;margin-bottom:14px;overflow:hidden;background:#fff;scroll-margin-top:14px;}
  .detail .head{display:flex;align-items:center;gap:12px;padding:15px 18px;cursor:pointer;} .detail .head:hover{background:var(--n100);}
  .detail .head .num{width:29px;height:29px;border-radius:8px;background:var(--yellow);color:var(--ink-d);font-weight:700;font-size:13px;display:inline-flex;align-items:center;justify-content:center;flex:none;}
  .detail .head h2{margin:0;font-size:19px;font-weight:600;flex:1;letter-spacing:-.2px;}
  .detail .head .toggle{width:29px;height:29px;border-radius:2px;background:var(--ink-d);color:#fff;flex:none;display:inline-flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;line-height:1;}
  .detail .head .toggle::before{content:"+";} .detail.open .head .toggle::before{content:"\2212";}
  .detail .head:hover .toggle{background:linear-gradient(180deg,var(--yellow),var(--amber));color:var(--ink-d);}
  .detail .body{display:none;padding:0 18px 20px;} .detail.open .body{display:block;}
  .goal{background:var(--ink);color:#fff;border-left:6px solid var(--yellow);border-radius:10px;padding:14px 17px;margin:4px 0 16px;}
  .goal .lbl{color:var(--yellow);font-size:11px;letter-spacing:2px;font-weight:700;text-transform:uppercase;margin-bottom:4px;} .goal p{margin:0;font-size:14.5px;color:#eaf0f3;}
  .tablewrap{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;border:1px solid var(--line);border-radius:10px;overflow:hidden;min-width:760px;}
  thead th{background:var(--ink);color:#fff;text-align:left;font-size:12px;font-weight:600;padding:11px 13px;white-space:nowrap;}
  th.c,td.c{text-align:center;}
  tbody td{padding:12px 13px;border-top:1px solid var(--line);font-size:13.5px;vertical-align:middle;}
  tbody tr:nth-child(even) td{background:var(--rowalt);}
  td.item{font-weight:600;} td.cust{color:var(--n700);font-size:12.5px;} td.notes{color:var(--n600);font-size:12px;font-style:italic;}
  td.num{font-weight:700;color:var(--n500);text-align:center;width:38px;}
  td.owner{font-weight:600;color:var(--ink);} td.owner .empty{color:var(--n500);font-weight:400;font-style:italic;}
  .badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;white-space:nowrap;}
  .b-high{background:rgba(51,207,119,.16);color:#1e8f4e;} .b-med{background:rgba(255,170,19,.20);color:var(--amber-d);}
  .b-low{background:var(--n100);color:var(--n600);} .b-tbd{background:transparent;color:var(--n500);font-style:italic;font-weight:500;}
  .b-prog{background:rgba(51,207,119,.16);color:#1e8f4e;} .b-prog::before{content:"● ";}
  .b-scope{background:rgba(255,170,19,.20);color:var(--amber-d);}
  .b-yes{background:rgba(51,207,119,.16);color:#1e8f4e;} .b-no{background:rgba(255,14,74,.12);color:var(--error);}
  .plat{display:inline-block;font-size:11px;font-weight:600;padding:3px 9px;border-radius:6px;background:var(--n100);color:var(--n700);white-space:nowrap;}
  .state{padding:40px 0;text-align:center;color:var(--n600);font-size:14px;}
  .updated{font-size:12px;color:var(--n500);}
</style>
</head>
<body>
<header class="top">
  <div class="brand">
    <svg viewBox="0 0 64 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M24 17 L32 10 L40 17" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M15 29 L32 15 L49 29" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M6 41 L32 20 L58 41" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="wm">TREAD</span>
  </div>
  <div class="eyebrow">Prioritized · Workflow-Based</div>
  <h1>Product Backlog</h1>
  <p>Live view — pulls the shared Google Sheet on every load.</p>
</header>
<main>
  <div class="sheetbar">
    <span class="grow">✏️ Add items &amp; set Product Owner in the Sheet. <span class="updated" id="updated"></span></span>
    <button class="ghost" id="refresh">↻ Refresh</button>
    <a href="https://docs.google.com/spreadsheets/d/1mbwdKbiiiOnplz-oTUf0p0xPVzDblbH-j--aQW_bq1o/edit" target="_blank" rel="noopener">Open Google Sheet</a>
  </div>
  <p class="sec-label">Workflows · click to drill in</p>
  <p class="legend-key"><span class="dot">●</span> In Progress &nbsp;&nbsp; <span class="dot-scope">◆</span> Product Scoping</p>
  <div class="overview" id="overview"><div class="state">Loading roadmap…</div></div>
  <div id="rest" style="display:none;">
    <div class="hr"></div>
    <div class="toolbar">
      <p class="sec-label">Workflow detail</p>
      <button class="btn" id="expandAll">Expand all</button>
      <button class="btn primary" id="collapseAll">Collapse all</button>
    </div>
    <div id="details"></div>
  </div>
</main>
<script>
// === CONFIG ===
const SHEET_ID = "1mbwdKbiiiOnplz-oTUf0p0xPVzDblbH-j--aQW_bq1o";
// Google CSV endpoint (requires Sheet shared "Anyone with the link → Viewer").
// If this is ever blocked, use File → Share → Publish to web → CSV and paste that URL here instead.
const CSV_URL = "https://docs.google.com/spreadsheets/d/"+SHEET_ID+"/gviz/tq?tqx=out:csv";

// Baked-in snapshot — the page renders this immediately so it's NEVER blank.
// If the live Sheet is reachable, that overrides this on load.
const COLS=["Workflow","Item","Platform","Customers (ACV)","Impact","Effort","Vibeable?","Status","Product Owner","Notes"];
const FALLBACK=[
["Onboarding","Driver Model Redesign","Web + Mobile","All customers","High","High","No","","",""],
["Onboarding","Vendor Reactivation","Web","Statewide ($205K), TransPhos ($42K)","Medium","Medium","TBD","","","Similar to Driver Model Redesign"],
["Dispatch Management","Two-Way Messaging","Web + Mobile","NLS ($44K), Holcim GTA, GVA","High","High","TBD","","",""],
["Dispatch Management","Driver ETA","Web","GVA, Daniela ($10K)","Medium","Medium","TBD","","",""],
["Rate Set Up","Project Rates","Web","JW Golding, 4M ($52K), Brinks, Rock On ($30K)","High","High","No","In Progress","","Should include load-level rate matching"],
["Rate Set Up","Enterprise Rate Hardening","Web","All customers","High","High","Yes","In Progress","",""],
["Rate Set Up","Tax Visibility","Web","Rock On ($30K)","Medium","Medium","TBD","","",""],
["Rate Set Up","Vendor-Specific Rates","Web","Rock On Trucks ($30K), Prime Aggregate ($75K), PJ Keating ($50K)","Medium","Medium","TBD","","",""],
["Data Input","Hourly UX","Mobile + Web","Volker Stevin ($180K), Rock On ($30K)","High","Medium","Yes","In Progress","",""],
["Data Input","Recurring Orders","Web","RPMx ($105K), Werdco ($170K), Volker Stevin ($180K)","High","Medium","Yes","","",""],
["Approvals","Lock UoM on Scale Ticket","Mobile","TransPhos ($42K)","Medium","Low","Yes","Product Scoping","","Might be reporting"],
["Approvals","Driver Ticket Flow Submission","Mobile + Web","TransPhos ($42K), AHS ($39K)","High","Medium","TBD","Product Scoping","",""],
["Approvals","New Roles","Web","AHS ($39K), Tomlinson ($194K)","High","Medium","TBD","","",""],
["Connected Customer Ecosystem","Allow Vendors to Make Billing Edits","Web","Arizona Agg, Rock On ($30K), Raj","Medium","Medium","TBD","","",""],
["Parent Co View","Flatten Billing Data","Web","Statewide ($205K), NS Trucking, Leah, Quality, Whitaker ($38K)","Medium","High","TBD","","",""],
["Exporting","Export Settlement Data (CSV)","Web","Statewide ($205K), any customer using settlements","Medium","Medium","Yes","","",""],
["Exporting","QB Integration (Rutter)","Web","Rock On ($30K), Marex ($45K), 4M ($52K), Werdco ($170K), Pineridge ($49K)","High","High","Yes","","",""],
["Exporting","BE PDF Generation","Web","Pineridge ($49K), Whitaker ($38K), TransPhos ($42K), Marex ($45K)","Medium","Medium","TBD","","","Blocking Bulk Download requests"],
["Advanced","Prevailing Wage","Web","Rock On ($30K)","High","High","Yes","In Progress","",""],
["Advanced","Material Costs per Load","Web","Daniela ($10K), AHS ($39K)","Medium","Low","Yes","","",""],
["Advanced","Fuel Surcharge on Material Sold","Web","Walker Ag ($25K)","Low","Medium","TBD","","",""]
];
function fallbackRows(){ return FALLBACK.map(a=>{const o={};COLS.forEach((k,i)=>o[k]=a[i]);return o;}); }

const GOALS = {
  "Onboarding":"Make it fast and reliable to set up and reactivate drivers and vendors, so customers can get their teams and partners operational without manual workarounds.",
  "Dispatch Management":"Give dispatchers real-time visibility and two-way communication with drivers so jobs stay coordinated and on-track.",
  "Rate Set Up":"Get rates right at the source — let customers configure project, customer, and tax rates accurately up front so every downstream invoice starts from correct numbers.",
  "Data Input":"Capture accurate, billable data the moment work happens — especially hourly jobs — so nothing is lost, mis-entered, or has to be reconstructed later.",
  "Approvals":"Lock down ticket accuracy and streamline review so only verified, dispute-proof data flows into billing.",
  "Connected Customer Ecosystem":"Bring vendors and partners into the billing workflow so corrections and edits happen collaboratively in-platform, not over email.",
  "Parent Co View":"Give parent companies a single, flattened view of billing across all their entities for oversight, roll-up, and reconciliation.",
  "Exporting":"Move finalized billing data into customers' accounting systems — QuickBooks, CSV — without manual re-entry or duplicate work.",
  "Advanced":"Support complex, regulation- and contract-driven billing scenarios like prevailing wage and material cost tracking."
};
function lvl(v){if(!v)return"";if(v==="TBD")return'<span class="badge b-tbd">TBD</span>';const c=v==="High"?"b-high":v==="Medium"?"b-med":"b-low";return'<span class="badge '+c+'">'+esc(v)+'</span>';}
function vibe(v){if(!v||v==="TBD")return'<span class="badge b-tbd">TBD</span>';if(v==="No")return'<span class="badge b-no">No</span>';if(v==="Yes")return'<span class="badge b-yes">Yes</span>';return'<span class="badge b-low">'+esc(v)+'</span>';}
function statusCell(s){if(!s)return"";if(s==="In Progress")return'<span class="badge b-prog">In Progress</span>';return'<span class="badge b-scope">'+esc(s)+'</span>';}
function plat(p){return p?'<span class="plat">'+esc(p)+'</span>':'';}
function owner(o){return o?'<span>'+esc(o)+'</span>':'<span class="empty">unassigned</span>';}
function wfChip(rs){if(rs.some(r=>r.Status==="In Progress"))return'<span class="chip chip-prog">In Progress</span>';if(rs.some(r=>r.Status==="Product Scoping"))return'<span class="chip chip-scope">Product Scoping</span>';return'<span class="chip chip-plan">Planned</span>';}
function esc(s){return (s==null?"":String(s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function parseCSV(text){
  const rows=[]; let row=[],f="",i=0,q=false;
  while(i<text.length){const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){f+='"';i+=2;continue;} q=false;i++;continue;} f+=c;i++;continue; }
    if(c==='"'){q=true;i++;continue;}
    if(c===','){row.push(f);f="";i++;continue;}
    if(c==='\n'){row.push(f);rows.push(row);row=[];f="";i++;continue;}
    if(c==='\r'){i++;continue;}
    f+=c;i++;
  }
  if(f.length||row.length){row.push(f);rows.push(row);}
  return rows;
}

function render(rows){
  const order=[],groups={};
  rows.forEach(r=>{const w=r.Workflow;if(!w)return;if(!groups[w]){groups[w]=[];order.push(w);}groups[w].push(r);});
  document.getElementById("overview").innerHTML=order.map((w,i)=>{
    const items=groups[w].map(r=>{const d=r.Status==="In Progress"?'<span class="dot">●</span> ':r.Status==="Product Scoping"?'<span class="dot-scope">◆</span> ':'';return'<li>'+d+esc(r.Item)+'</li>';}).join("");
    return'<div class="ov-card" data-i="'+i+'"><div class="ov-top"><span class="ov-num">'+(i+1)+'</span>'+wfChip(groups[w])+'</div><h3>'+esc(w)+'</h3><ul>'+items+'</ul><div class="ov-foot">View detail</div></div>';
  }).join("");
  document.getElementById("details").innerHTML=order.map((w,i)=>{
    const goal=GOALS[w]?'<div class="goal"><div class="lbl">Goal</div><p>'+esc(GOALS[w])+'</p></div>':'';
    const body=groups[w].map((r,ri)=>'<tr><td class="num">'+(ri+1)+'</td><td class="item">'+esc(r.Item)+'</td><td class="c">'+plat(r.Platform)+'</td><td class="cust">'+esc(r["Customers (ACV)"])+'</td><td class="c">'+lvl(r.Impact)+'</td><td class="c">'+lvl(r.Effort)+'</td><td class="c">'+vibe(r["Vibeable?"])+'</td><td class="c">'+statusCell(r.Status)+'</td><td class="owner">'+owner(r["Product Owner"])+'</td><td class="notes">'+esc(r.Notes)+'</td></tr>').join("");
    return'<div class="detail" id="wf'+i+'"><div class="head" data-i="'+i+'"><span class="num">'+(i+1)+'</span><h2>'+esc(w)+'</h2>'+wfChip(groups[w])+'<span class="toggle"></span></div><div class="body">'+goal+'<div class="tablewrap"><table><thead><tr><th>#</th><th>Item</th><th class="c">Platform</th><th>Customers (ACV)</th><th class="c">Impact</th><th class="c">Effort</th><th class="c">Vibeable?</th><th class="c">Status</th><th>Product Owner</th><th>Notes</th></tr></thead><tbody>'+body+'</tbody></table></div></div></div>';
  }).join("");
  document.getElementById("rest").style.display="block";
  document.querySelectorAll(".ov-card").forEach(c=>c.addEventListener("click",()=>openDetail(+c.dataset.i,true)));
  document.querySelectorAll(".detail .head").forEach(h=>h.addEventListener("click",()=>document.getElementById("wf"+h.dataset.i).classList.toggle("open")));
  document.getElementById("expandAll").onclick=()=>document.querySelectorAll(".detail").forEach(d=>d.classList.add("open"));
  document.getElementById("collapseAll").onclick=()=>document.querySelectorAll(".detail").forEach(d=>d.classList.remove("open"));
  const f=order.findIndex(w=>groups[w].some(r=>r.Status==="In Progress"));openDetail(f<0?0:f,false);
}
function openDetail(i,scroll){const el=document.getElementById("wf"+i);if(!el)return;el.classList.add("open");if(scroll)el.scrollIntoView({behavior:"smooth",block:"start"});}

async function load(){
  // Always render the baked-in snapshot first so the page is never blank.
  render(fallbackRows());
  document.getElementById("updated").textContent="· Built-in snapshot";
  // Then try to refresh live from the Sheet (overrides snapshot if reachable).
  try{
    const res=await fetch(CSV_URL+"&_="+Date.now());
    if(!res.ok) throw new Error("HTTP "+res.status);
    const text=await res.text();
    const table=parseCSV(text).filter(r=>r.length>1);
    if(table.length<2) throw new Error("no rows");
    const header=table[0].map(h=>h.trim());
    const rows=table.slice(1).map(a=>{const o={};header.forEach((h,i)=>o[h]=(a[i]||"").trim());return o;});
    render(rows);
    document.getElementById("updated").textContent="· Live · updated "+new Date().toLocaleString();
  }catch(e){
    document.getElementById("updated").textContent="· Built-in snapshot (Sheet not connected)";
  }
}
document.getElementById("refresh").onclick=load;
load();
</script>
</body>
</html>
