<style>
:root { color-scheme: light; }
* { box-sizing: border-box; }
html, body {

  padding: 0;
  background: #f7f8fa;

.wrap { max-width: 1100px; margin: 0 auto; padding: 24px 20px 60px; }

/* Header */
.header { display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; }
.brand-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.brand-mark { display: block; }
.brand-name { font-size: 12px; font-weight: 800; letter-spacing: 0.16em; color: #0a1929; }
.title { font-size: 32px; font-weight: 800; color: #0a1929; letter-spacing: -0.02em; margin: 0 0 6px; line-height: 1.1; }
.subtitle { color: #6a7280; font-size: 13px; margin: 0; }
.refresh-meta { font-size: 12px; color: #8a93a4; display: flex; align-items: center; gap: 8px; }
.spinner { width: 12px; height: 12px; border: 2px solid #d8def0; border-top-color: #FFD400; border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Stats */
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
.stat { background: #fff; border: 1px solid #e7eaf1; border-radius: 10px; padding: 14px 16px; }
.stat-label { color: #6a7280; font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
.stat-value { font-size: 22px; font-weight: 700; color: #0a1929; margin-top: 4px; line-height: 1.1; }
.stat-sub { font-size: 12px; color: #8a93a4; margin-top: 2px; }
.stat-accent .stat-value { color: #0a1929; }

/* Timeline */
.section-title { font-size: 13px; font-weight: 600; color: #4b5161; text-transform: uppercase; letter-spacing: 0.06em; margin: 28px 0 12px; }
.timeline { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; margin-bottom: 8px; }
.tl-card { background: #fff; border: 1px solid #e7eaf1; border-left: 3px solid #FFD400; border-radius: 8px; padding: 12px 14px; cursor: pointer; transition: transform .12s, box-shadow .12s; }
.tl-card:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(10, 25, 41, 0.08); }
.tl-card.mobile { border-left-color: #1f2d44; }
.tl-date { font-size: 11px; color: #8a93a4; font-weight: 500; }
.tl-version { font-size: 14px; font-weight: 600; color: #0a1929; margin-top: 2px; }
.tl-type { display: inline-block; margin-top: 6px; font-size: 10px; padding: 2px 7px; border-radius: 4px; background: #FFF8C2; color: #0a1929; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
.tl-card.mobile .tl-type { background: #e8edf3; color: #1f2d44; }

/* Filters */
.filters { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
.search { flex: 1; min-width: 200px; }
.search input { width: 100%; padding: 9px 12px; border: 1px solid #d6dbe6; border-radius: 8px; background: #fff; font-size: 13px; color: #1a1d29; outline: none; }
.search input:focus { border-color: #FFD400; box-shadow: 0 0 0 3px rgba(255, 212, 0, 0.30); }
.toggle { display: inline-flex; background: #fff; border: 1px solid #d6dbe6; border-radius: 8px; padding: 2px; gap: 2px; }
.toggle button { background: transparent; border: 0; padding: 7px 12px; border-radius: 6px; font-size: 12px; font-weight: 500; color: #4b5161; cursor: pointer; }
.toggle button.active { background: #0a1929; color: #fff; }

/* Releases list */
.release { background: #fff; border: 1px solid #e7eaf1; border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
.release-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; cursor: pointer; gap: 12px; }
.release-head:hover { background: #fafbfd; }
.release-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
.chip { font-size: 10px; padding: 3px 8px; border-radius: 999px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap; }
.chip-web { background: #FFF8C2; color: #0a1929; }
.chip-mobile { background: #e8edf3; color: #1f2d44; }
.release-version { font-weight: 600; font-size: 14px; color: #0a1929; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.release-date { font-size: 12px; color: #6a7280; white-space: nowrap; }
.release-counts { display: flex; gap: 8px; align-items: center; font-size: 11px; color: #6a7280; flex-shrink: 0; }
.count-pill { padding: 2px 7px; border-radius: 4px; background: #f4f5f9; font-weight: 500; }
.count-pill.new { background: #eef7ff; color: #1d5fb3; }
.count-pill.improve { background: #fff7e6; color: #b5710a; }
.count-pill.fix { background: #fdebef; color: #b5325b; }
.expand-icon { font-size: 14px; color: #8a93a4; transition: transform .15s; }
.release.open .expand-icon { transform: rotate(90deg); }
.release-body { display: none; padding: 0 18px 18px; border-top: 1px solid #f0f2f7; padding-top: 14px; }
.release.open .release-body { display: block; }
.release-body h4 { font-size: 12px; font-weight: 700; color: #4b5161; text-transform: uppercase; letter-spacing: 0.06em; margin: 16px 0 8px; }
.release-body h4:first-child { margin-top: 0; }
.release-body h5 { font-size: 13px; font-weight: 600; color: #0a1929; margin: 12px 0 4px; }
.release-body p { margin: 4px 0 8px; color: #2d3340; }
.release-body ul { margin: 4px 0 8px; padding-left: 20px; }
.release-body li { margin: 3px 0; color: #2d3340; }
.release-body .feature { background: #f7f9fc; border-left: 3px solid #FFD400; padding: 10px 14px; border-radius: 6px; margin: 6px 0 10px; }
.release-body .feature .feat-name { font-weight: 600; color: #0a1929; margin-bottom: 2px; }
.release-body .feature .feat-desc { color: #4b5161; font-size: 13px; }
.release-body .permalink { margin-top: 14px; font-size: 12px; }
.release-body .permalink a { color: #0a1929; text-decoration: none; }
.release-body .permalink a:hover { text-decoration: underline; }

.empty { padding: 30px; text-align: center; color: #8a93a4; background: #fff; border: 1px dashed #d6dbe6; border-radius: 10px; }
.banner { background: #FFFAEB; border: 1px solid #FFD400; border-radius: 8px; padding: 10px 14px; font-size: 12px; color: #0a1929; margin-bottom: 14px; display: none; }
.banner.show { display: block; }

@media (max-width: 720px) {
  .stats { grid-template-columns: repeat(2, 1fr); }
  .release-counts { display: none; }
  .month-hero-grid { grid-template-columns: 1fr !important; }
}

/* Tabs */
.tabs { display: inline-flex; background: #fff; border: 1px solid #e7eaf1; border-radius: 10px; padding: 4px; gap: 2px; margin-bottom: 22px; }
.tab { background: transparent; border: 0; padding: 9px 16px; border-radius: 7px; font-size: 13px; font-weight: 700; color: #4b5161; cursor: pointer; position: relative; letter-spacing: 0.01em; }
.tab:hover { color: #0a1929; }
.tab.active { background: #0a1929; color: #fff; box-shadow: inset 0 -3px 0 #FFD400; }

/* Insights view */
.month-filter { display: flex; gap: 6px; margin-bottom: 22px; flex-wrap: wrap; align-items: center; padding: 14px 16px; background: #fff; border: 1px solid #e7eaf1; border-radius: 10px; }
.month-filter-label { font-size: 11px; color: #6a7280; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-right: 10px; }
.month-pill { background: transparent; border: 1px solid #d6dbe6; border-radius: 999px; padding: 6px 14px; font-size: 12px; font-weight: 600; color: #4b5161; cursor: pointer; transition: background .12s, border-color .12s, color .12s; }

.month-pill.active { background: #0a1929; border-color: #0a1929; color: #fff; }
.month-pill .count { opacity: 0.6; font-weight: 500; margin-left: 5px; font-size: 11px; }
.month-pill.active .count { opacity: 0.8; }

.insight-summary { background: #fff; border: 1px solid #e7eaf1; border-radius: 10px; padding: 18px 20px; margin-bottom: 24px; }
.insight-summary p { margin: 0; color: #2d3340; }
.insight-summary p + p { margin-top: 10px; }
.chart-wrap { background: #fff; border: 1px solid #e7eaf1; border-radius: 10px; padding: 16px 18px 8px; margin-bottom: 24px; }
.chart-wrap h3 { font-size: 13px; font-weight: 600; color: #4b5161; text-transform: uppercase; letter-spacing: 0.06em; margin: 0 0 12px; }
.chart-canvas-box { position: relative; height: 220px; }

.month-card { background: #fff; border: 1px solid #e7eaf1; border-radius: 14px; padding: 30px 34px; margin-bottom: 22px; }
.month-head { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 12px; padding-bottom: 18px; border-bottom: 1px solid #f0f2f7; margin-bottom: 22px; }
.month-title { font-size: 30px; font-weight: 800; color: #0a1929; margin: 0; letter-spacing: -0.02em; line-height: 1.1; }
.month-sub { font-size: 13px; color: #8a93a4; margin-top: 6px; font-weight: 500; }
.month-stats-inline { display: flex; gap: 22px; flex-wrap: wrap; align-items: center; }
.stat-inline { display: inline-flex; flex-direction: column; align-items: flex-end; }
.stat-inline b { color: #0a1929; font-weight: 700; font-size: 22px; line-height: 1; letter-spacing: -0.01em; }
.stat-inline span { color: #8a93a4; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 4px; }

.month-narrative { font-size: 17px; line-height: 1.6; color: #2d3340; margin: 0 0 8px; padding: 0 0 0 16px; background: transparent; border: 0; border-left: 3px solid #FFD400; font-weight: 450; }

.insight-section { margin-top: 30px; }
.insight-section-title { font-size: 11px; font-weight: 800; color: #0a1929; text-transform: uppercase; letter-spacing: 0.1em; margin: 0 0 16px; display: inline-flex; align-items: center; gap: 8px; }
.insight-section-title::before { content: ''; width: 18px; height: 3px; background: #FFD400; display: inline-block; }

/* Top Wins — numbered, prominent (Tread yellow squares with navy text) */
.top-wins { display: grid; gap: 14px; }
.top-win { display: flex; gap: 14px; align-items: flex-start; }
.top-win-num { width: 30px; height: 30px; flex-shrink: 0; border-radius: 6px; background: #FFD400; color: #0a1929; font-weight: 800; font-size: 14px; display: flex; align-items: center; justify-content: center; margin-top: 1px; }

.initiatives { display: grid; gap: 8px; }

.initiative.expanded { background: #fff; border-color: #d8def0; }
.initiative-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
.initiative-name-block { flex: 1; min-width: 0; }
.initiative-name { font-weight: 600; font-size: 14px; color: #0a1929; line-height: 1.35; }
.initiative-summary { font-size: 13px; color: #4b5161; margin-top: 3px; line-height: 1.5; }
.initiative-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.initiative-count { font-size: 11px; color: #8a93a4; font-weight: 500; }
.initiative .expand-icon { font-size: 14px; color: #8a93a4; transition: transform .15s; }
.initiative.expanded .expand-icon { transform: rotate(90deg); }
.initiative-details { display: none; margin-top: 14px; padding-top: 14px; border-top: 1px solid #eef1f6; }
.initiative.expanded .initiative-details { display: block; }
.initiative-details ul { margin: 0; padding-left: 18px; }
.initiative-details li { font-size: 13px; color: #2d3340; margin: 4px 0; line-height: 1.55; }

/* Tag pills */
.theme-tag { font-size: 10px; padding: 3px 8px; border-radius: 4px; background: #FFF8C2; color: #0a1929; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap; }
.theme-tag.mobile { background: #e8edf3; color: #1f2d44; }
.theme-tag.platform { background: #fef0f5; color: #b5325b; }
.theme-tag.ai { background: #f4ecff; color: #6c3fb8; }
.theme-tag.ops { background: #fff5e6; color: #b5710a; }

/* What's Next — pill-style cards */
.inprogress-clean { list-style: none; padding: 0; margin: 0; display: grid; gap: 8px; }
.inprogress-clean li { padding: 11px 16px; border-radius: 8px; background: #FFFAEB; border-left: 3px solid #FFD400; font-size: 13px; color: #4b5161; line-height: 1.5; }
.inprogress-clean li b { color: #0a1929; font-weight: 600; }

/* AI-generated badge */
.ai-badge-row { font-size: 10px; color: #6c3fb8; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
.ai-badge-row::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: #6c3fb8; }
</style>
</head>

Hide Driver Phone Numbers

Material Type Management
Companies can now create, edit, and delete their own material types directly from Settings, matching the existing equipment type management experience.

"Report an Issue" on Reports
A new "Report Issue" link on the Reports page lets you quickly flag issues with a specific report — it opens a support conversation with the report link pre-attached.

  {ts:"1774624660.322329",version:"Deploy #436",releaseDate:"2026-03-26",isMobile:false,permalink:"https://treadinc.slack.com/archives/C057XJNGEGL/p1774624660322329?thread_ts=1774574242.902629&cid=C057XJNGEGL",content:`:clipboard: Release Notes — Deploy #436 (2026-03-26)
New Features
Project-Level Freight Rates
Project managers can now define multi-condition freight rates directly on a project — combining site, service class, equipment type, and material so the right rate applies automatically. The system cascades the correct customer, vendor, and driver pricing to every ticket, eliminating manual overrides. (Rolling out to select customers)
Phase Tracking on Loads
Phases can now be linked to project materials and automatically cascade to orders, jobs, and loads when a material is selected. A new Phase column on the dispatch and approvals loads tables shows the phase name and code at a glance, and phases are also supported when importing tickets.
Internal Notes on Jobs
Back-office users can now add and edit internal notes directly on jobs. Notes are company-scoped — only visible to users within the same company — making it easy to pass billing instructions and context through the dispatch chain without exposing them to other parties.
Shift Notes
A Shift Notes field is now available on the DriverDay Shift tab, giving reviewers helpful context (e.g., late arrivals, equipment issues, dispatcher adjustments) right where they need it while reviewing shift hours.
Staging Site on Dispatch Routes (Rolling out to select customers)
Dispatchers can now assign a staging site as an intermediate stop between pickup and dropoff. The staging site can be set across all dispatch forms — new orders, job edits, bulk edits, projects, and quick orders.
Trailer in Dispatch Side Panel (Rolling out to select customers)
Trailer details are now visible in the side panel on the Dispatch page for quick reference without leaving the current view.
Improvements
• Compliance document expiration email notifications can now be controlled per document type in user notification preferences
• Job Card PDF now shows pickup and dropoff site with an updated layout
• Driver rate amounts are now shown on the Payables invoice for internal drivers
• Imported sites from external systems now have their addresses automatically geocoded
• Duplicate ticket detection now uses a dedicated field instead of an AI review state, making the duplicate quick filter more accurate and reliable
Bug Fixes
• Fixed a P1 issue where internal drivers could not see their driver rate amount in the app or on web
• Fixed the Approve button incorrectly appearing for non-completed loads when the new approvals feature was enabled
• Fixed a permissions issue preventing some users from accessing the Data Importer
• Fixed missing label for email notification method settings on the User Profile page`},
  {ts:"1774380861.103209",version:"Deploy #434",releaseDate:"2026-03-23",isMobile:false,permalink:"https://treadinc.slack.com/archives/C057XJNGEGL/p1774380861103209?thread_ts=1774319639.294459&cid=C057XJNGEGL",content:`:clipboard: Release Notes — Deploy #434 (2026-03-23)

When an order is on Hold or Weather Hold, drivers are now blocked from starting their jobs — preventing accidental hold removal that previously affected all trucks on the order.

async function fetchSlack_DISABLED() {
  // Pull last 90 days worth of Release Notes from Saloni in #shipit
  // We bake the channel id and user id to avoid an extra lookup.
  const after = new Date(Date.now() - 95 * 24 * 60 * 60 * 1000)
    .toISOString().slice(0, 10);
  const query = '"Release Notes" from:<@U09FNPV2B9B> in:<#C057XJNGEGL> after:' + after;

  // Page through up to 3 pages (60 results) to be safe.
  const all = [];
  let cursor = '';
  for (let page = 0; page < 3; page++) {
    const args = { query, sort: 'timestamp', sort_dir: 'desc', limit: 20, include_context: false };
    if (cursor) args.cursor = cursor;
    let resp;
    try {
      resp = await window.cowork.callMcpTool(
        'mcp__3f64072c-e238-4ac1-9c8c-5e1131c45d3d__slack_search_public_and_private',
        args
      );
    } catch (e) {
      throw e;
    }
    // Normalize response shape
    let text = '';
    let nextCursor = '';
    if (typeof resp === 'string') {
      // Sometimes wrapped JSON, sometimes raw text
      try {
        const parsed = JSON.parse(resp);
        text = parsed.results || resp;
        nextCursor = extractCursor(parsed.pagination_info || '');
      } catch {
        text = resp;
      }
    } else if (resp && typeof resp === 'object') {
      if (resp.results) {
        text = resp.results;
        nextCursor = extractCursor(resp.pagination_info || '');
      } else if (resp.content && Array.isArray(resp.content) && resp.content[0]?.text) {
        const inner = resp.content[0].text;
        try {
          const parsed = JSON.parse(inner);
          text = parsed.results || inner;
          nextCursor = extractCursor(parsed.pagination_info || '');
        } catch {
          text = inner;
        }
      } else {
        text = JSON.stringify(resp);
      }
    }
    const parsed = parseSlackText(text);
    all.push(...parsed);
    if (!nextCursor || parsed.length < 20) break;
    cursor = nextCursor;
  }
  return all;
}

function extractCursor(info) {
  if (!info) return '';
  const m = info.match(/cursor `([^`]+)`/);
  return m ? m[1] : '';
}

function parseSlackText(text) {
  if (!text) return [];
  // Split by result delimiter
  const blocks = text.split(/### Result \d+ of \d+/);
  const out = [];
  for (let i = 1; i < blocks.length; i++) {
    const b = blocks[i];
    const tsMatch = b.match(/Message_ts:\s*([\d.]+)/);
    const permalinkMatch = b.match(/Permalink:\s*\[link\]\(([^)]+)\)/);
    // Text body: between "Text: \n" and the next "---" or "Context before:" or "Context after:"
    const textIdx = b.indexOf('Text:');
    if (textIdx < 0) continue;
    let body = b.slice(textIdx + 'Text:'.length);
    // Trim leading newlines
    body = body.replace(/^\s*\n/, '');
    // Stop at the trailing delimiter
    const stops = ['\n---\n', '\nContext before:', '\nContext after:'];
    let cut = body.length;
    for (const s of stops) {
      const idx = body.indexOf(s);
      if (idx >= 0 && idx < cut) cut = idx;
    }
    body = body.slice(0, cut).trim();
    if (!/Release Notes/i.test(body)) continue;
    const titleLine = body.split('\n').find(l => /Release Notes/i.test(l));
    if (!titleLine) continue;
    // Title: ":clipboard: Release Notes — Deploy #471 (2026-05-21)" (em-dash or hyphen)
    const titleMatch = titleLine.match(/Release Notes\s*[—–\-]\s*(.+?)\s*\((\d{4}-\d{2}-\d{2})\)/);
    if (!titleMatch) continue;
    const version = titleMatch[1].trim();
    const releaseDate = titleMatch[2];
    const isMobile = /mobile/i.test(version);
    out.push({
      ts: tsMatch ? tsMatch[1] : '',
      version,
      releaseDate,
      isMobile,
      permalink: permalinkMatch ? permalinkMatch[1] : '',
      content: body
    });
  }
  return out;
}

function mergeReleases(baked, fresh) {
  const map = new Map();
  for (const r of baked) map.set(r.ts, r);
  for (const r of fresh) map.set(r.ts, r); // fresh wins
  return Array.from(map.values()).sort((a, b) => {
    if (b.releaseDate !== a.releaseDate) return b.releaseDate.localeCompare(a.releaseDate);
    return parseFloat(b.ts) - parseFloat(a.ts);
  });
}

function countSection(content, label) {
  // Find the section header (case-insensitive), count "•" bullets or "h5"-style headers
  const lines = content.split('\n');
  let inSection = false;
  let count = 0;
  for (const line of lines) {
    const stripped = line.replace(/^[─\s]+|[─\s]+$/g, '').trim();
    if (!stripped) continue;
    if (/^(new features|improvements|bug fixes|other)\b/i.test(stripped)) {
      inSection = stripped.toLowerCase().startsWith(label.toLowerCase());
      continue;
    }
    if (/^in progress\b/i.test(stripped)) { inSection = false; continue; }
    if (!inSection) continue;
    if (line.trim().startsWith('•')) count++;
    else if (label === 'New Features' && /^[A-Z]/.test(line) && line.length > 8 && !line.startsWith('•') && !line.startsWith('───')) {
      // Heuristic: feature subheadings (e.g., "Job and Order Notifications")
      // Only count if the *next* non-empty line is a description (not another header)
      // Simpler: count subheadings followed by a description line
    }
  }
  // For "New Features", also count named feature blocks (subheading followed by description)
  if (label === 'New Features') {
    count = 0;
    const parts = content.split(/\n(?:New Features)\b/i);
    if (parts.length > 1) {
      const section = parts[1].split(/\n(?:Improvements|Bug Fixes|In Progress|Other)\b/i)[0];
      // A "feature" = a non-bulleted, non-empty, non-divider line that has the next line as description
      const secLines = section.split('\n').map(l => l.trim()).filter(l => l && !/^─+$/.test(l));
      for (let i = 0; i < secLines.length; i++) {
        const l = secLines[i];
        if (l.startsWith('•')) continue;
        if (/^new features$/i.test(l)) continue;
        // Heuristic for a feature title: 3..80 chars, no period at end, starts uppercase
        if (l.length >= 3 && l.length <= 90 && /^[A-Z0-9"]/.test(l) && !l.endsWith('.') && !l.endsWith(':')) {
          count++;
        }
      }
    }
  }
  return count;
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function fmtDate(iso) {
  const d = new Date(iso + 'T12:00:00');

}
function fmtFullDate(iso) {

}

function formatContentHtml(content) {
  // Convert the plain-text Slack content into structured HTML
  const lines = content.split('\n');
  let html = '';
  let i = 0;

  // Skip the title line
  if (lines[i] && /Release Notes/i.test(lines[i])) i++;

  let currentSection = null;
  let inFeatureBlock = false;
  let openList = false;

  function closeList() { if (openList) { html += '</ul>'; openList = false; } }

  while (i < lines.length) {
    let raw = lines[i];
    let line = raw.trim();
    i++;

    if (!line || /^─+$/.test(line)) { closeList(); inFeatureBlock = false; continue; }

    // Section header
    if (/^(new features|improvements|bug fixes|in progress.*|other)\b/i.test(line) && line.length < 80) {
      closeList(); inFeatureBlock = false;
      currentSection = line.toLowerCase();
      html += `<h4>${escapeHtml(line)}</h4>`;
      continue;
    }

    // Sub-section like "Project-level Rates" (a line that's not a bullet, not too long, no period)
    if (!line.startsWith('•') && /^[A-Z0-9"]/.test(line) && line.length <= 80 && !line.endsWith('.') && !line.endsWith(':')) {
      closeList();
      // Decide: feature block (has description on next line) vs sub-section header (followed by bullets)
      const next = lines[i] ? lines[i].trim() : '';
      if (currentSection && currentSection.startsWith('new features') && next && !next.startsWith('•') && !/^(improvements|bug fixes|in progress|other|new features)\b/i.test(next) && !/^─+$/.test(next)) {
        // Feature block: title + description paragraph
        let desc = '';
        while (i < lines.length) {
          const peek = lines[i].trim();
          if (!peek || /^─+$/.test(peek)) break;
          if (peek.startsWith('•')) break;
          if (/^(improvements|bug fixes|in progress|other|new features)\b/i.test(peek) && peek.length < 80) break;
          // Stop if this looks like a new sub-header (short line followed by another non-bullet)
          desc += (desc ? ' ' : '') + peek;
          i++;
        }
        html += `<div class="feature"><div class="feat-name">${escapeHtml(line)}</div><div class="feat-desc">${escapeHtml(desc)}</div></div>`;
      } else {
        // Sub-section header
        html += `<h5>${escapeHtml(line)}</h5>`;
      }
      continue;
    }

    // Bullet
    if (line.startsWith('•')) {
      if (!openList) { html += '<ul>'; openList = true; }
      html += `<li>${escapeHtml(line.slice(1).trim())}</li>`;
      continue;
    }

    // Plain paragraph fallback
    closeList();
    html += `<p>${escapeHtml(line)}</p>`;
  }
  closeList();
  return html;
}

function countsFor(r) {
  // Lightweight counts from raw content
  const features = (r.content.match(/^(?!•)(?:[A-Z0-9"][^\n]{2,80})$/gm) || [])
    .filter(t => {
      // Filter to feature names within "New Features" section
      const idx = r.content.indexOf(t);
      const before = r.content.slice(0, idx).toLowerCase();
      const lastSection = ['new features', 'improvements', 'bug fixes', 'in progress', 'other']
        .map(s => ({ s, i: before.lastIndexOf(s) }))
        .filter(x => x.i >= 0)
        .sort((a, b) => b.i - a.i)[0];
      return lastSection && lastSection.s === 'new features';
    }).length;
  // Better: parse New Features named blocks
  const nfBlock = r.content.split(/\bNew Features\b/i)[1];
  let featuresCount = 0;
  if (nfBlock) {
    const stop = nfBlock.search(/\b(Improvements|Bug Fixes|In Progress|Other)\b/i);
    const section = stop >= 0 ? nfBlock.slice(0, stop) : nfBlock;
    const subs = section.split('\n').map(l => l.trim()).filter(Boolean).filter(l => !/^─+$/.test(l));
    for (let i = 0; i < subs.length; i++) {
      const l = subs[i];
      if (l.startsWith('•')) continue;
      if (l.length >= 3 && l.length <= 90 && /^[A-Z0-9"]/.test(l) && !l.endsWith('.') && !l.endsWith(':')) {
        // It's a feature heading if followed by a description (non-bullet, non-heading)
        const next = subs[i + 1];
        if (next && !next.startsWith('•')) featuresCount++;
      }
    }
  }

  const improveBlock = r.content.split(/\bImprovements\b/i)[1];
  let improveCount = 0;
  if (improveBlock) {
    const stop = improveBlock.search(/\b(Bug Fixes|In Progress|Other)\b/i);
    const sec = stop >= 0 ? improveBlock.slice(0, stop) : improveBlock;
    improveCount = (sec.match(/^•/gm) || []).length;
  }

  const fixBlock = r.content.split(/\bBug Fixes\b/i)[1];
  let fixCount = 0;
  if (fixBlock) {
    const stop = fixBlock.search(/\b(In Progress|Other)\b/i);
    const sec = stop >= 0 ? fixBlock.slice(0, stop) : fixBlock;
    fixCount = (sec.match(/^•/gm) || []).length;
  }

  // "Other" section bullets get added to fixes (since they're typically misc fixes)
  const otherBlock = r.content.split(/\bOther\b/i)[1];
  if (otherBlock) {
    const stop = otherBlock.search(/\b(In Progress)\b/i);
    const sec = stop >= 0 ? otherBlock.slice(0, stop) : otherBlock;
    const otherCount = (sec.match(/^•/gm) || []).length;
    fixCount += otherCount;
  }

  return { features: featuresCount, improvements: improveCount, fixes: fixCount };
}

let monthlyChartInstance = null;

function monthKeyOf(iso) { return iso.slice(0, 7); }

function buildMonthlyBuckets() {
  // Group releases by YYYY-MM, computing counts of releases / features / fixes / improvements
  const buckets = {};
  for (const r of releases) {
    const k = monthKeyOf(r.releaseDate);
    if (!buckets[k]) buckets[k] = { key: k, releases: [], mobileCount: 0, webCount: 0, features: 0, improvements: 0, fixes: 0 };
    buckets[k].releases.push(r);
    const c = countsFor(r);
    buckets[k].features += c.features;
    buckets[k].improvements += c.improvements;
    buckets[k].fixes += c.fixes;
    if (r.isMobile) buckets[k].mobileCount++; else buckets[k].webCount++;
  }
  // Sort newest first
  return Object.values(buckets).sort((a, b) => b.key.localeCompare(a.key));
}

function fmtMonth(key) {
  const [y, m] = key.split('-').map(Number);
  return new Date(y, m - 1, 1).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
}

// Month filter state for the Monthly Insights view
let monthFilter = 'all';

function renderMonthFilter(buckets) {
  const el = document.getElementById('monthFilter');

    monthFilter = 'all';
  }
  const pills = [{ key: 'all', label: 'All months', count: buckets.length }]
    .concat(buckets.map(b => ({ key: b.key, label: fmtMonth(b.key), count: b.releases.length })));
  el.innerHTML =
    '<span class="month-filter-label">Filter</span>' +
    pills.map(p => `
      <button class="month-pill ${p.key === monthFilter ? 'active' : ''}" data-key="${p.key}">
        ${escapeHtml(p.label)}<span class="count">${p.count}</span>
      </button>
    `).join('');
  el.querySelectorAll('.month-pill').forEach(btn => {
    btn.addEventListener('click', () => {
      monthFilter = btn.dataset.key;
      renderInsights();
      document.getElementById('insightsView')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  });
}

function renderMonthlyChart(buckets) {
  const canvas = document.getElementById('monthlyChart');
  if (!canvas || typeof Chart === 'undefined') return;
  // Chronological order for the chart
  const ordered = buckets.slice().reverse();
  const labels = ordered.map(b => fmtMonth(b.key));
  const webData = ordered.map(b => b.webCount);
  const mobileData = ordered.map(b => b.mobileCount);

  if (monthlyChartInstance) monthlyChartInstance.destroy();
  monthlyChartInstance = new Chart(canvas, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Web Deploys', data: webData, backgroundColor: '#0a1929', borderRadius: 4, stack: 'a' },
        { label: 'Mobile Releases', data: mobileData, backgroundColor: '#FFD400', borderRadius: 4, stack: 'a' }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { position: 'top', align: 'end', labels: { boxWidth: 10, font: { size: 11 } } },
        tooltip: { callbacks: {
          footer: (items) => {
            const sum = items.reduce((s, it) => s + it.parsed.y, 0);
            return 'Total: ' + sum + ' release' + (sum === 1 ? '' : 's');
          }
        }}
      },
      scales: {
        x: { stacked: true, grid: { display: false }, ticks: { font: { size: 11 } } },
        y: { stacked: true, beginAtZero: true, ticks: { stepSize: 2, font: { size: 11 } }, grid: { color: '#eef0f5' } }
      }
    }
  });
}

async function generateThemeForMonth_DISABLED(monthKey, monthReleases) {

Output ONLY the JSON object, no preamble.`;

    const response = await window.cowork.askClaude(prompt, [{ name: monthLabel + '_releases', content: releaseList }]);

    for (const t of (parsed.themes || [])) {
      const tag = (t.tag || '').toLowerCase();
      t.tagClass = tag === 'mobile' ? 'mobile' : tag === 'ai' ? 'ai' : tag === 'ops' ? 'ops' : 'platform';
      if (!['Platform', 'Mobile', 'Ops', 'AI'].includes(t.tag)) t.tag = 'Platform';
    }
    aiThemeCache[monthKey] = { ...parsed, generatedAt: Date.now() };
    saveAiThemeCache();
    return parsed;
  } catch (e) {
    console.warn('Theme generation failed for', monthKey, e);
    return null;
  } finally {
    generatingMonths.delete(monthKey);
  }
}

function getThemeForMonth(monthKey) {
  if (MONTHLY_THEMES[monthKey]) return MONTHLY_THEMES[monthKey];
  if (aiThemeCache[monthKey]) return aiThemeCache[monthKey];
  return null;
}

async function autoGenerateMissingThemes() {
  const buckets = buildMonthlyBuckets();
  for (const b of buckets) {
    if (MONTHLY_THEMES[b.key] || aiThemeCache[b.key]) continue;
    if (b.releases.length < 1) continue;
    // Mark card as "Analyzing…"
    markMonthAnalyzing(b.key, true);
    const theme = await generateThemeForMonth(b.key, b.releases);
    markMonthAnalyzing(b.key, false);
    if (theme) renderInsights();
  }
}

function markMonthAnalyzing(monthKey, state) {
  const card = document.querySelector(`.month-card[data-key="${monthKey}"]`);
  if (!card) return;
  let badge = card.querySelector('.analyzing-badge');
  if (state) {
    if (!badge) {
      badge = document.createElement('span');
      badge.className = 'analyzing-badge';
      badge.style.cssText = 'font-size:11px;color:#FFD400;font-weight:600;display:inline-flex;align-items:center;gap:6px;margin-left:8px;';
      badge.innerHTML = '<span class="spinner" style="width:10px;height:10px;border-width:2px;"></span> Analyzing with Claude…';
      card.querySelector('.month-sub')?.appendChild(badge);
    }
  } else if (badge) {
    badge.remove();
  }
}

// ============================================================
// BOOTSTRAP (static build)
// ============================================================
// === BEGIN DATA: generated_at ===
// GENERATED_AT is replaced at publish time by the scheduled task.
const GENERATED_AT = "2026-07-06T16:14:57.707913+00:00";
// === END DATA: generated_at ===

renderAll();

// Show generated-at timestamp
(function () {
  const el = document.getElementById('generatedAt');
  if (!el) return;
  const fallback = new Date().toISOString();
  const iso = GENERATED_AT && GENERATED_AT !== '__' + 'GENERATED_AT__' ? GENERATED_AT : fallback;
  try {
    const d = new Date(iso);
    el.textContent = d.toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit', timeZoneName: 'short' });
  } catch {
    el.textContent = iso;
  }
})();

// Disable auto-generated theme code paths in this static build
function autoGenerateMissingThemes() {}
function markMonthAnalyzing() {}
function getThemeForMonth(monthKey) { return MONTHLY_THEMES[monthKey] || null; }
</script>
